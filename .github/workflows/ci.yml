name: Microservices CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: inventory_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test Inventory Service
        run: cd inventory-service && mvn clean verify -Dspring.profiles.active=test
        env:
          DB_PASSWORD: postgres
          JWT_SECRET: test_secret_key_2026
          REDIS_HOST: localhost

      - name: Build & Test Order Service
        run: cd order-service && mvn clean verify -Dspring.profiles.active=test
        env:
          DB_PASSWORD: postgres
          JWT_SECRET: test_secret_key_2026
